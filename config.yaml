# Trading Pipeline Configuration

# System execution mode: PAPER, BACKTEST, or LIVE
execution_mode: "PAPER"

# Active broker adapter: paper, dhan
active_broker: "paper"

# Trade mode: EQUITY or OPTION
trade_type: "EQUITY"

# Flat commission charges per order in Rs.
commission_value: 20

# Broker specific configuration
broker:
  dhan:
    client_id: "${DHAN_CLIENT_ID}"
    api_token: "${DHAN_API_TOKEN}"
  paper:
    initial_capital: 1000000.0  # 10 Lakhs (5x leverage allows this easily)
    tick_interval_seconds: 0.005 # Fast updates for realistic testing
    symbols:
      - "HDFCBANK"
      - "INDIGO"
      - "AXISBANK"
      - "DRREDDY"
      - "TECHM"
  binance:
    symbols:
      - "BTCUSDT"
      - "ETHUSDT"
      - "SOLUSDT"

# Risk Management parameters
risk:
  risk_reward_ratio: 2.0
  risk_percentage_per_trade: 0.01 
  default_qty: 500 # Fallback default quantity if symbol not specified in symbol_quantities
  symbol_quantities:
    HDFCBANK: 500
    INDIGO: 100
    AXISBANK: 800
    DRREDDY: 100
    TECHM: 500

# Strategies configuration
strategies:
  - type: "Axis_HDFC_Multi_Tier"
    name: "Axis_HDFC_MultiTier_V4"
    params:
      ema_filter_len: 50
      st_period: 10
      st_multiplier: 2.5
      timeframe_seconds: 60 # 1 minute candle timeframe for live production paper trading

# Interactive Web Dashboard Configuration
dashboard:
  enabled: true
  port: 8050

# Real-time Notifications configuration
notifications:
  enabled: true
  provider: "telegram"  # options: telegram, twilio_whatsapp, twilio_sms
  eod_report_time: "23:55"  # IST time to auto-send daily Excel report to Telegram
  telegram:
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    chat_id: "${TELEGRAM_CHAT_ID}"
  twilio:
    account_sid: "${TWILIO_ACCOUNT_SID}"
    auth_token: "${TWILIO_AUTH_TOKEN}"
    from_number: "${TWILIO_FROM_NUMBER}" # e.g. +14155238886 for Sandbox
    to_number: "${TWILIO_TO_NUMBER}" # e.g. +91XXXXXXXXXX
